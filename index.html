<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나희 툴 허브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-hover: rgba(0,0,0,0.16);
      --text-primary: #1a1814;
      --text-secondary: #6b6760;
      --text-tertiary: #a09d98;
      --accent: #2c2c2a;
      --tag-bg: #f0ede8;
      --tag-text: #6b6760;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161614;
        --surface: #1e1e1c;
        --border: rgba(255,255,255,0.08);
        --border-hover: rgba(255,255,255,0.18);
        --text-primary: #f0ede8;
        --text-secondary: #9b9892;
        --text-tertiary: #5c5a57;
        --accent: #e8e5e0;
        --tag-bg: #2a2a28;
        --tag-text: #9b9892;
      }
    }

    html { font-size: 16px; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ── */
    header {
      padding: 3.5rem 2rem 2.5rem;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
    }

    .site-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      font-weight: 400;
      margin-bottom: 0.6rem;
    }

    .site-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.75rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    .site-sub {
      margin-top: 0.5rem;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    /* ── 구분선 ── */
    .divider {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    .divider hr {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── 카드 그리드 ── */
    main {
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 2rem 4rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    /* ── 카드 ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.5rem 1.3rem;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: border-color 0.18s ease, transform 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      opacity: 0;
      transition: opacity 0.18s ease;
      background: radial-gradient(ellipse at 60% 0%, rgba(0,0,0,0.03) 0%, transparent 70%);
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .card:hover::after { opacity: 1; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .card-arrow {
      width: 20px;
      height: 20px;
      color: var(--text-tertiary);
      transition: color 0.18s;
    }
    .card:hover .card-arrow { color: var(--text-secondary); }

    .card-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-weight: 300;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 1rem;
      padding-top: 0.9rem;
      border-top: 1px solid var(--border);
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* ── 푸터 ── */
    footer {
      margin-top: auto;
      padding: 1.5rem 2rem;
      text-align: center;
    }

    .footer-text {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    /* ── 페이드인 ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header  { animation: fadeUp 0.4s ease both; }
    .card:nth-child(1) { animation: fadeUp 0.4s 0.08s ease both; }
    .card:nth-child(2) { animation: fadeUp 0.4s 0.14s ease both; }
    .card:nth-child(3) { animation: fadeUp 0.4s 0.20s ease both; }
    .card:nth-child(4) { animation: fadeUp 0.4s 0.26s ease both; }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      header { padding: 2.5rem 1.25rem 2rem; }
      main   { padding: 1.5rem 1.25rem 3rem; }
      .grid  { grid-template-columns: 1fr; }
      .site-title { font-size: 1.45rem; }
    }
  </style>
</head>
<body>

  <header>
    <p class="site-label">Tools</p>
    <h1 class="site-title">도구 허브</h1>
    <p class="site-sub">동인 창작 활동을 위한 도구 모음</p>
  </header>

  <div class="divider"><hr /></div>

  <main>
    <div class="grid">

      <!-- 마감 캘린더 -->
      <a class="card" href="https://t.co/1F32l6xCiN" target="_blank" rel="noopener">
        <div class="card-top">
          <div class="card-icon">📅</div>
          <svg class="card-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M5 15L15 5M15 5H8M15 5v7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="card-name">마감 캘린더</p>
        <p class="card-desc">행사별 원고 마감일 관리 및 원고 진행 상황 추적</p>
        <div class="card-footer">
          <span class="tag">일정</span>
          <span class="tag">원고</span>
        </div>
      </a>

      <!-- 동인 인포 빌더 -->
      <a class="card" href="https://t.co/ERkK0ohBdE" target="_blank" rel="noopener">
        <div class="card-top">
          <div class="card-icon">🖼️</div>
          <svg class="card-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M5 15L15 5M15 5H8M15 5v7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="card-name">동인 인포 빌더</p>
        <p class="card-desc">동인 행사용 인포 생성 도구</p>
        <div class="card-footer">
          <span class="tag">인포</span>
          <span class="tag">행사</span>
        </div>
      </a>

      <!-- 창작 워크스페이스 -->
      <a class="card" href="https://t.co/6ziWzMij51" target="_blank" rel="noopener">
        <div class="card-top">
          <div class="card-icon">✍️</div>
          <svg class="card-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M5 15L15 5M15 5H8M15 5v7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="card-name">창작 워크스페이스</p>
        <p class="card-desc">아이디어·플롯·캐릭터·플로우차트 탭 구성</p>
        <div class="card-footer">
          <span class="tag">창작</span>
          <span class="tag">글쓰기</span>
        </div>
      </a>

      <!-- 부스 매니저 -->
      <a class="card" href="https://t.co/KxSn1AGNzi" target="_blank" rel="noopener">
        <div class="card-top">
          <div class="card-icon">📦</div>
          <svg class="card-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M5 15L15 5M15 5H8M15 5v7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="card-name">부스 매니저</p>
        <p class="card-desc">행사별 부스 품목 관리 및 미리보기</p>
        <div class="card-footer">
          <span class="tag">부스</span>
          <span class="tag">행사</span>
        </div>
      </a>

    </div>
  </main>

  <footer>
    <p class="footer-text">지인용 페이지입니다</p>
  </footer>

</body>
</html>
